name: Sync Skills To COS

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"

      - ".github/workflows/sync-skills-to-cos.yml"
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install coscmd
        run: python -m pip install --upgrade pip coscmd tencentcloud-sdk-python

      - name: Detect changed skill directories
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "secondme_changed=true" >> "$GITHUB_OUTPUT"
            echo "dev_assistant_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          printf '%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -q '^skills/secondme/'; then
            echo "secondme_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "secondme_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -q '^skills/secondme-dev-assistant/'; then
            echo "dev_assistant_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "dev_assistant_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "${{ secrets.TENCENT_COS_SECRET_ID }}" \
            -s "${{ secrets.TENCENT_COS_SECRET_KEY }}" \
            -b "mindverseglobal-cos-1309544882" \
            -r "ap-shanghai"

      # --- COS directory sync (skill/ path) ---

      - name: Sync secondme directory to COS
        if: steps.changes.outputs.secondme_changed == 'true'
        run: |
          coscmd upload -r -s --delete -f -y \
            -H '{"Content-Type":"text/plain; charset=utf-8","Cache-Control":"no-cache"}' \
            skills/secondme/ \
            skill/secondme/

      - name: Sync secondme-dev-assistant directory to COS
        if: steps.changes.outputs.dev_assistant_changed == 'true'
        run: |
          coscmd upload -r -s --delete -f -y \
            -H '{"Content-Type":"text/plain; charset=utf-8","Cache-Control":"no-cache"}' \
            skills/secondme-dev-assistant/ \
            skill/secondme-dev-assistant/

      # --- Well-known endpoint (for npx skills add https://second.me) ---

      - name: Generate index.json
        run: |
          mkdir -p .well-known/skills
          echo '{"skills":[' > .well-known/skills/index.json
          first=true
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            name=$(basename "$skill_dir")

            # Extract description from frontmatter
            desc=$(sed -n '/^---$/,/^---$/{ /^description:/{ s/^description: *//; s/^"//; s/"$//; p; q; } }' "$skill_dir/SKILL.md")

            # Collect all .md files relative to skill dir
            files=$(cd "$skill_dir" && find . -name "*.md" -type f | sed 's|^\./||' | sort | jq -R . | jq -s .)

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> .well-known/skills/index.json
            fi

            jq -n --arg n "$name" --arg d "$desc" --argjson f "$files" \
              '{name:$n, description:$d, files:$f}' >> .well-known/skills/index.json
          done
          echo ']}' >> .well-known/skills/index.json

          echo "Generated index.json:"
          cat .well-known/skills/index.json

      - name: Prepare well-known directory
        run: |
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            name=$(basename "$skill_dir")
            target=".well-known/skills/$name"
            mkdir -p "$target"
            cp -r "$skill_dir"/* "$target/"
          done

          echo "Well-known structure:"
          find .well-known -type f

      - name: Upload well-known skills to COS
        run: |
          coscmd upload -r -f -y \
            -H '{"Content-Type":"text/plain; charset=utf-8","Cache-Control":"no-cache"}' \
            .well-known/skills/ \
            .well-known/skills/

          # Upload index.json with correct content type
          coscmd upload -f -y \
            -H '{"Content-Type":"application/json; charset=utf-8","Cache-Control":"no-cache"}' \
            .well-known/skills/index.json \
            .well-known/skills/index.json

      - name: Refresh Tencent CDN skill directories
        if: steps.changes.outputs.secondme_changed == 'true' || steps.changes.outputs.dev_assistant_changed == 'true'
        env:
          SECONDME_CHANGED: ${{ steps.changes.outputs.secondme_changed }}
          DEV_ASSISTANT_CHANGED: ${{ steps.changes.outputs.dev_assistant_changed }}
          TENCENT_CDN_SECRET_ID: ${{ secrets.TENCENT_CDN_SECRET_ID }}
          TENCENT_CDN_SECRET_KEY: ${{ secrets.TENCENT_CDN_SECRET_KEY }}
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os

          from tencentcloud.cdn.v20180606 import cdn_client, models
          from tencentcloud.common import credential
          from tencentcloud.common.profile.client_profile import ClientProfile
          from tencentcloud.common.profile.http_profile import HttpProfile

          secret_id = os.environ.get("TENCENT_CDN_SECRET_ID") or os.environ.get("TENCENT_COS_SECRET_ID")
          secret_key = os.environ.get("TENCENT_CDN_SECRET_KEY") or os.environ.get("TENCENT_COS_SECRET_KEY")

          if not secret_id or not secret_key:
              print("No Tencent CDN credentials configured. Skipping CDN refresh.")
              raise SystemExit(0)

          paths = []
          if os.environ.get("SECONDME_CHANGED") == "true":
              paths.append("https://mindverseglobal-cos-cdn.mindverse.com/skill/secondme/")
          if os.environ.get("DEV_ASSISTANT_CHANGED") == "true":
              paths.append("https://mindverseglobal-cos-cdn.mindverse.com/skill/secondme-dev-assistant/")

          if not paths:
              print("No changed skill directories. Skipping CDN refresh.")
              raise SystemExit(0)

          cred = credential.Credential(secret_id, secret_key)
          http_profile = HttpProfile(endpoint="cdn.tencentcloudapi.com")
          client_profile = ClientProfile()
          client_profile.httpProfile = http_profile
          client = cdn_client.CdnClient(cred, "", client_profile)

          request = models.PurgePathCacheRequest()
          request.from_json_string(json.dumps({
              "Paths": paths,
              "FlushType": "flush"
          }))
          response = client.PurgePathCache(request)
          print(response.to_json_string())
          PY

      # --- ClawHub publish ---

      - name: Publish secondme to ClawHub
        continue-on-error: true
        if: steps.changes.outputs.secondme_changed == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN is not configured. Skipping ClawHub publish."
            exit 0
          fi

          SECONDME_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import yaml

          text = Path("skills/secondme/SKILL.md").read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              raise SystemExit("No YAML frontmatter found in skills/secondme/SKILL.md")

          _, frontmatter, _ = text.split("---\n", 2)
          data = yaml.safe_load(frontmatter) or {}
          version = data.get("metadata", {}).get("version") or data.get("version")
          if not version:
              raise SystemExit("No version found in skills/secondme/SKILL.md")
          print(version)
          PY
          )"

          bunx clawhub login --token "$CLAWHUB_TOKEN"
          bunx clawhub publish skills/secondme \
            --version "$SECONDME_VERSION"

      - name: Publish secondme-dev-assistant to ClawHub
        continue-on-error: true
        if: steps.changes.outputs.dev_assistant_changed == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN is not configured. Skipping ClawHub publish."
            exit 0
          fi

          DEV_ASSISTANT_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import yaml

          text = Path("skills/secondme-dev-assistant/SKILL.md").read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              raise SystemExit("No YAML frontmatter found in skills/secondme-dev-assistant/SKILL.md")

          _, frontmatter, _ = text.split("---\n", 2)
          data = yaml.safe_load(frontmatter) or {}
          version = data.get("metadata", {}).get("version") or data.get("version")
          if not version:
              raise SystemExit("No version found in skills/secondme-dev-assistant/SKILL.md")
          print(version)
          PY
          )"

          bunx clawhub login --token "$CLAWHUB_TOKEN"
          bunx clawhub publish skills/secondme-dev-assistant \
            --version "$DEV_ASSISTANT_VERSION"

      # --- Summary ---

      - name: Print uploaded targets
        run: |
          echo "=== Uploaded Files ==="
          echo "Index:      https://second.me/.well-known/skills/index.json"
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            name=$(basename "$skill_dir")
            echo "Skill:      https://second.me/.well-known/skills/$name/SKILL.md"
            echo "COS dir:    https://mindverseglobal-cos-1309544882.cos.ap-shanghai.myqcloud.com/skill/$name/"
            echo "CDN dir:    https://mindverseglobal-cos-cdn.mindverse.com/skill/$name/"
          done
