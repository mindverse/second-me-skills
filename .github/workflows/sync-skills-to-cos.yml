name: Sync Skills To COS

on:
  push:
    branches:
      - main
    paths:
      - "skills/secondme/**"
      - "skills/secondme-dev-assistant/**"
      - ".github/workflows/sync-skills-to-cos.yml"
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install coscmd
        run: python -m pip install --upgrade pip coscmd

      - name: Detect changed skill directories
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "secondme_changed=true" >> "$GITHUB_OUTPUT"
            echo "dev_assistant_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          printf '%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -q '^skills/secondme/'; then
            echo "secondme_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "secondme_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -q '^skills/secondme-dev-assistant/'; then
            echo "dev_assistant_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "dev_assistant_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "${{ secrets.TENCENT_COS_SECRET_ID }}" \
            -s "${{ secrets.TENCENT_COS_SECRET_KEY }}" \
            -b "mindverseglobal-cos-1309544882" \
            -r "ap-shanghai"

      - name: Sync secondme directory to COS
        if: steps.changes.outputs.secondme_changed == 'true'
        run: |
          coscmd upload -r -s --delete -f -y \
            skills/secondme \
            skill/secondme/

          coscmd upload -f -y \
            -H '{"Content-Type":"text/markdown; charset=utf-8","Cache-Control":"no-cache"}' \
            skills/secondme/SKILL.md \
            skill/secondme/SKILL.md

      - name: Sync secondme-dev-assistant directory to COS
        if: steps.changes.outputs.dev_assistant_changed == 'true'
        run: |
          coscmd upload -r -s --delete -f -y \
            skills/secondme-dev-assistant \
            skill/secondme-dev-assistant/

          coscmd upload -f -y \
            -H '{"Content-Type":"text/markdown; charset=utf-8","Cache-Control":"no-cache"}' \
            skills/secondme-dev-assistant/SKILL.md \
            skill/secondme-dev-assistant/SKILL.md

      - name: Publish secondme to ClawHub
        if: steps.changes.outputs.secondme_changed == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN is not configured. Skipping ClawHub publish."
            exit 0
          fi

          SECONDME_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path("skills/secondme/SKILL.md").read_text(encoding="utf-8")
          match = re.search(r'^---\n(.*?)\n---', text, re.S | re.M)
          if not match:
              raise SystemExit("No YAML frontmatter found in skills/secondme/SKILL.md")
          frontmatter = match.group(1)
          version_match = re.search(r'^version:\s*["\']?([0-9]+\.[0-9]+\.[0-9]+)["\']?\s*$', frontmatter, re.M)
          if not version_match:
              raise SystemExit("No semver version found in skills/secondme/SKILL.md")
          print(version_match.group(1))
          PY
          )"

          bunx clawhub login --token "$CLAWHUB_TOKEN"
          bunx clawhub publish skills/secondme \
            --version "$SECONDME_VERSION" \
            --yes

      - name: Publish secondme-dev-assistant to ClawHub
        if: steps.changes.outputs.dev_assistant_changed == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN is not configured. Skipping ClawHub publish."
            exit 0
          fi

          DEV_ASSISTANT_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path("skills/secondme-dev-assistant/SKILL.md").read_text(encoding="utf-8")
          match = re.search(r'^---\n(.*?)\n---', text, re.S | re.M)
          if not match:
              raise SystemExit("No YAML frontmatter found in skills/secondme-dev-assistant/SKILL.md")
          frontmatter = match.group(1)
          version_match = re.search(r'^version:\s*["\']?([0-9]+\.[0-9]+\.[0-9]+)["\']?\s*$', frontmatter, re.M)
          if not version_match:
              raise SystemExit("No semver version found in skills/secondme-dev-assistant/SKILL.md")
          print(version_match.group(1))
          PY
          )"

          bunx clawhub login --token "$CLAWHUB_TOKEN"
          bunx clawhub publish skills/secondme-dev-assistant \
            --version "$DEV_ASSISTANT_VERSION" \
            --yes

      - name: Print uploaded targets
        if: steps.changes.outputs.secondme_changed == 'true' || steps.changes.outputs.dev_assistant_changed == 'true'
        run: |
          if [ "${{ steps.changes.outputs.secondme_changed }}" = "true" ]; then
            echo "Uploaded: https://mindverseglobal-cos-1309544882.cos.ap-shanghai.myqcloud.com/skill/secondme/SKILL.md"
            echo "Synced directory: https://mindverseglobal-cos-1309544882.cos.ap-shanghai.myqcloud.com/skill/secondme/"
            echo "ClawHub sync requested for: skills/secondme"
          fi

          if [ "${{ steps.changes.outputs.dev_assistant_changed }}" = "true" ]; then
            echo "Uploaded: https://mindverseglobal-cos-1309544882.cos.ap-shanghai.myqcloud.com/skill/secondme-dev-assistant/SKILL.md"
            echo "Synced directory: https://mindverseglobal-cos-1309544882.cos.ap-shanghai.myqcloud.com/skill/secondme-dev-assistant/"
            echo "ClawHub sync requested for: skills/secondme-dev-assistant"
          fi
